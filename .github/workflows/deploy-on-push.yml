name: Deploy EmbeddedEngineer on Push

on:
  push:

jobs:
  generatecode:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
      with:  
        lfs: true
    
    - name: Deploy EmbeddedEngineer
      shell: pwsh
      env:
        LICENSE_STRING: ${{ secrets.EEALICENSE }}
      run: |
        $licenseString = $env:LICENSE_STRING
        if ([string]::IsNullOrWhiteSpace($licenseString)) {
          Write-Error "Error: EEALICENSE secret is not set or is empty. Failing workflow."
          exit 1
        }
        Write-Host "Running Deploy-EmbeddedEngineer script with license..."
        .\scripts\Deploy-EmbeddedEngineer.ps1 -LicenseString "$licenseString"
    
    - name: Verify deployment
      shell: pwsh
      run: |
        if (Test-Path ".\eea.lic") {
          Write-Host "License file created successfully"
        } else {
          Write-Host "Error: License file not found"
          exit 1
        }
        
        if (Test-Path ".\EEA\") {
          Write-Host "EmbeddedEngineer extracted successfully"
          Get-ChildItem -Path ".\EEA\"
        } else {
          Write-Host "Error: EmbeddedEngineer directory not found"
          exit 1
        }

    - name: Run EmbeddedEngineer Automation
      shell: pwsh
      run: |
        Write-Host "Running EmbeddedEngineer Automation..."
        .\eea\EmbeddedEngineer.Automation.exe --Model .\TraficLight.github.qeax --License .\eea.lic --PackageGuid "`{904EF962-C541-4627-A463-AD6F1328BFB3`}"
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "EmbeddedEngineer Automation completed successfully"
        } else {
          Write-Host "EmbeddedEngineer Automation failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
    
    - name: Setup MSBuild Path
      uses: microsoft/setup-msbuild@v3

    - name: Install Windows SDK 10.0.20348
      shell: pwsh
      run: |
        Write-Host "Checking for available Windows SDK versions on runner"
        $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Include"
        if (Test-Path $sdkPath) {
          $availableSdks = Get-ChildItem $sdkPath -Directory | Sort-Object Name -Descending
          Write-Host "Available SDK versions:"
          $availableSdks | ForEach-Object { Write-Host "  $($_.Name)" }

          # Check if 10.0.20348.0 exists
          $targetSdk = $availableSdks | Where-Object { $_.Name -eq "10.0.20348.0" }
          if ($targetSdk) {
            Write-Host "Target SDK 10.0.20348.0 is already installed"
          } else {
            Write-Host "Target SDK not found, will use latest available: $($availableSdks[0].Name)"
          }
        } else {
          Write-Host "No Windows SDK found, installing via Chocolatey"
          choco install windows-sdk-10.1 --version=10.1.22000.194 -y --no-progress --force
        }

    - name: Build TrafficLights solution with MSBuild
      shell: pwsh
      run: |
        $slnPath = "TrafficLight\visualstudio\TrafficLights.sln"
        Write-Host "Building solution $slnPath with MSBuild"

        # Find the latest available Windows SDK version
        $sdkPath = "C:\Program Files (x86)\Windows Kits\10\Include"
        $availableSdks = Get-ChildItem $sdkPath -Directory | Sort-Object Name -Descending
        $latestSdk = $availableSdks[0].Name
        Write-Host "Using Windows SDK version: $latestSdk"

        msbuild $slnPath /p:Configuration=Release /p:Platform=x64 /p:PreferredToolArchitecture=x64 /p:WindowsTargetPlatformVersion=$latestSdk /m


    -  name: Publish Binary Artifact
       uses: actions/upload-artifact@v7.0.0
       with:
          name: TrafficLightBinary
          path: .\TrafficLight\visualstudio\x64\Release\*.exe
          retention-days: 5