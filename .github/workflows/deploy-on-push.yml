name: Deploy EmbeddedEngineer on Push

on:
  push:

jobs:
  generatecode:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
      with:  
        lfs: true
    
    - name: Deploy EmbeddedEngineer
      shell: pwsh
      env:
        LICENSE_STRING: ${{ secrets.EEALICENSE }}
      run: |
        $licenseString = $env:LICENSE_STRING
        if ([string]::IsNullOrWhiteSpace($licenseString)) {
          Write-Error "Error: EEALICENSE secret is not set or is empty. Failing workflow."
          exit 1
        }
        Write-Host "Running Deploy-EmbeddedEngineer script with license..."
        .\scripts\Deploy-EmbeddedEngineer.ps1 -LicenseString "$licenseString"
    
    - name: Verify deployment
      shell: pwsh
      run: |
        if (Test-Path ".\eea.lic") {
          Write-Host "License file created successfully"
        } else {
          Write-Host "Error: License file not found"
          exit 1
        }
        
        if (Test-Path ".\EEA\") {
          Write-Host "EmbeddedEngineer extracted successfully"
          Get-ChildItem -Path ".\EEA\"
        } else {
          Write-Host "Error: EmbeddedEngineer directory not found"
          exit 1
        }
    
    - name: Run EmbeddedEngineer Automation
      shell: pwsh
      run: |
        Write-Host "Running EmbeddedEngineer Automation..."
        .\eea\EmbeddedEngineer.Automation.exe --Model .\TraficLight.github.qeax --License .\eea.lic --PackageGuid "`{904EF962-C541-4627-A463-AD6F1328BFB3`}"
        
        if ($LASTEXITCODE -eq 0) {
          Write-Host "EmbeddedEngineer Automation completed successfully"
        } else {
          Write-Host "EmbeddedEngineer Automation failed with exit code: $LASTEXITCODE"
          exit $LASTEXITCODE
        }
    
    -  name: Setup MSBuild Path
       uses: microsoft/setup-msbuild@v3
        
    -  name: Build Solution
       run: msbuild TrafficLight/visualstudio/TrafficLights.sln /p:Configuration=Release

    -  name: Publish Binary Artifact
       uses: actions/upload-artifact@v7.0.0
       with:
          name: TrafficLightBinary
          path: .\TrafficLight\visualstudio\x64\Release\*.exe
          retention-days: 5